    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/gashapon/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>扭蛋</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        box-sizing: border-box;
      }

      :root {
        --sb-track: rgba(0, 0, 0, 0.08);
        --sb-thumb: #aaa;
        --sb-thumb-dark: #999;
        --sb-thumb-hover: #ccc;
      }

      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }

      ::-webkit-scrollbar-track {
        background: var(--sb-track);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb {
        border-radius: 4px;
        border: 3px solid transparent;
        background: linear-gradient(135deg, var(--sb-thumb), var(--sb-thumb-dark));
        background-clip: padding-box;
        box-shadow: inset 0 0 6px rgba(0, 0, 0, 0.25);
      }

      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(135deg, var(--sb-thumb-hover), var(--sb-thumb-dark));
      }

      .scrollable,
      body,
      html {
        scrollbar-width: thin;
        scrollbar-color: var(--sb-thumb) var(--sb-track);
      }
    </style>
